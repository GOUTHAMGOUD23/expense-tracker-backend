spring.application.name=expense-tracker-backend
# Server
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://junction.proxy.rlwy.net:40208/railway}
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.format_sql=true

jwt.secret=Spendly_Super_Secret_JWT_Key_2026_Must_Be_32Plus_Characters!
jwt.expiration=86400000
# ?? OAuth2 Google ?????????????????????????????????????????????
# Local:      Add http://localhost:8080/login/oauth2/code/google to Google Console
# Production: Add https://YOUR_BACKEND.onrender.com/login/oauth2/code/google to Google Console
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_BASE_URL:https://expense-tracker-backend-j36l.onrender.com}/login/oauth2/code/google

# ??????????????????????????????????????????????????????????????
# AI PROVIDER
# LOCAL:      ai.provider=ollama  (free, runs on your machine)
# PRODUCTION: ai.provider=openai  (or anthropic ? cloud servers can't run Ollama)
# ??????????????????????????????????????????????????????????????
ai.provider=${AI_PROVIDER:ollama}

# ?? Ollama (local only) ???????????????????????????????????????
ai.ollama.base-url=http://localhost:11434
ai.ollama.model=${OLLAMA_MODEL:llama3.2}

# ?? Logging ???????????????????????????????????????????????????
logging.level.com.expense=INFO
logging.level.org.springframework.security=WARN

# ?? CORS ??????????????????????????????????????????????????????
# Comma-separated list of allowed origins
# Add your Render frontend URL here in production
app.cors.allowed-origins=https://expense-tracker-frontend-aydi.onrender.com

# ?? Frontend redirect URL for OAuth2 ?????????????????????????
# Local:      http://localhost:3000/oauth2/redirect
# Production: https://YOUR_FRONTEND.onrender.com/oauth2/redirect
app.frontend.redirect-url=https://expense-tracker-frontend-aydi.onrender.com/oauth2/redirect
app.frontend.base-url=https://expense-tracker-frontend-aydi.onrender.com
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true